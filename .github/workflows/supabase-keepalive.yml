name: Supabase Keep-Alive

on:
  schedule:
    # Executa no primeiro dia de cada mês às 08:00 UTC
    - cron: '0 8 1 * *'
  workflow_dispatch: # permite acionar manualmente pelo GitHub

jobs:
  keepalive:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Health check no Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}")

          echo "Status HTTP: $STATUS"

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "Supabase ativo."
          else
            echo "Resposta inesperada: $STATUS"
            exit 1
          fi
